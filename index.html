<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool Tests</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .container {
      padding: 0;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(120, 120, 120, 0.35);
    }
    .login-header-img {
      display: block;
      width: 100%;
      height: auto;
    }
    .login-body {
      position: relative;
      z-index: 1;
      margin-top: -600px;
      padding: 32px 48px 48px;
    }
    .tab-bar {
      display: flex;
      background: var(--surface-low);
      border-radius: var(--radius-md);
      padding: 4px;
      margin-bottom: 28px;
      gap: 2px;
    }
    .tab-bar button {
      flex: 1;
      padding: 8px 10px;
      background: transparent;
      border: none;
      border-radius: calc(var(--radius-md) - 2px);
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: var(--on-surface-variant);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }
    .tab-bar button.tab-active {
      background: var(--surface-card);
      color: var(--on-surface);
      box-shadow: 0 1px 4px rgba(12,52,89,0.10);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="img/logo_login_header.png" alt="Boring Boxes" class="login-header-img">

    <div class="login-body">
    <!-- Tab bar -->
    <div class="tab-bar">
      <button id="tab-login" class="tab-active">Sign In</button>
      <button id="tab-register" class="hidden">Register</button>
      <button id="tab-student">Student</button>
    </div>

    <!-- Login form -->
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div style="position:relative;">
          <input type="password" id="login-password" placeholder="Password" required>
          <button type="button" id="toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;padding:0;display:flex;align-items:center;">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn">Sign In</button>
      <p id="login-error" class="error hidden"></p>
    </form>

    <!-- Register form -->
    <form id="register-form" class="hidden">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="Jane Smith" required>
      </div>
      <div class="form-group">
        <label for="reg-school">School Name</label>
        <input type="text" id="reg-school" placeholder="Our Homeschool" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" required>
      </div>
      <button type="submit" class="btn">Create Account</button>
      <p id="register-error" class="error hidden"></p>
      <p id="register-success" class="hidden" style="color:green;margin-top:12px;"></p>
    </form>

    <!-- Student magic link form -->
    <form id="student-form" class="hidden">
      <p style="color:#666;margin-bottom:16px;">Enter your email and we'll send you a link to sign in.</p>
      <div class="form-group">
        <label for="student-email">Your Email</label>
        <input type="email" id="student-email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn">Send Login Link</button>
      <p id="student-error" class="error hidden"></p>
      <p id="student-success" class="hidden" style="color:green;margin-top:12px;"></p>
    </form>
    </div><!-- /.login-body -->
  </div>

  <script type="module">
    import { login, getUser, getProfile } from './js/auth.js'
    import { supabase } from './js/supabase.js'

    // If already logged in, redirect
    getUser().then(async user => {
      if (user) {
        const profile = await getProfile(user.id)
        if (!profile) return
        if (profile.role === 'teacher') window.location.href = '/teacher/dashboard.html'
        else window.location.href = '/student/dashboard.html'
      }
    })

    // Show Register tab only when ?register=boringboxes is in the URL
    if (new URLSearchParams(window.location.search).get('register') === 'boringboxes') {
      document.getElementById('tab-register').classList.remove('hidden')
    }

    function showTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login')
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register')
      document.getElementById('student-form').classList.toggle('hidden', tab !== 'student')
      document.getElementById('tab-login').classList.toggle('tab-active', tab === 'login')
      document.getElementById('tab-register').classList.toggle('tab-active', tab === 'register')
      document.getElementById('tab-student').classList.toggle('tab-active', tab === 'student')
    }

    document.getElementById('tab-login').addEventListener('click', () => showTab('login'))
    document.getElementById('tab-register').addEventListener('click', () => showTab('register'))
    document.getElementById('tab-student').addEventListener('click', () => showTab('student'))

    // Password eyeball toggle
    document.getElementById('toggle-password').addEventListener('click', () => {
      const input = document.getElementById('login-password')
      const icon = document.getElementById('eye-icon')
      const showing = input.type === 'password'
      input.type = showing ? 'text' : 'password'
      icon.innerHTML = showing
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`
    })

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('login-email').value
      const password = document.getElementById('login-password').value
      const errorMsg = document.getElementById('login-error')
      try {
        const { user } = await login(email, password)
        const profile = await getProfile(user.id)
        if (!profile) throw new Error('No profile found. Please register first.')
        if (profile.role === 'teacher') window.location.href = '/teacher/dashboard.html'
        else window.location.href = '/student/dashboard.html'
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })

    // Register as teacher
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const name = document.getElementById('reg-name').value
      const school = document.getElementById('reg-school').value
      const email = document.getElementById('reg-email').value
      const password = document.getElementById('reg-password').value
      const errorMsg = document.getElementById('register-error')
      const successMsg = document.getElementById('register-success')

      try {
        const { data, error } = await supabase.auth.signUp({ email, password })
        if (error) throw error

        const userId = data.user.id
        await supabase.from('profiles').insert({ id: userId, role: 'teacher', full_name: name, email })
        await supabase.from('schools').insert({ teacher_id: userId, name: school })

        successMsg.textContent = 'Account created! You can now sign in.'
        successMsg.classList.remove('hidden')
        errorMsg.classList.add('hidden')
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })

    // Student magic link
    document.getElementById('student-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('student-email').value.trim().toLowerCase()
      const errorMsg = document.getElementById('student-error')
      const successMsg = document.getElementById('student-success')

      try {
        // Only allow emails a teacher has added (pending invite or already registered student)
        const [{ data: invite }, { data: studentProfile }] = await Promise.all([
          supabase.from('pending_invites').select('id').eq('email', email).maybeSingle(),
          supabase.from('profiles').select('id').eq('email', email).eq('role', 'student').maybeSingle()
        ])
        if (!invite && !studentProfile) {
          throw new Error("This email hasn't been added by a teacher. Ask your teacher to send you an invite.")
        }

        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: `${window.location.origin}/student/dashboard.html` }
        })
        if (error) throw error
        successMsg.textContent = 'Check your email for a login link!'
        successMsg.classList.remove('hidden')
        errorMsg.classList.add('hidden')
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })
  </script>
</body>
</html>
