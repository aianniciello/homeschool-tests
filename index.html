<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeschool Tests</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Homeschool Tests</h1>

    <!-- Tab buttons -->
    <div style="display:flex;gap:8px;margin-bottom:24px;">
      <button class="btn" id="tab-login">Sign In</button>
      <button class="btn btn-secondary" id="tab-register">Register as Teacher</button>
    </div>

    <!-- Login form -->
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn">Sign In</button>
      <p id="login-error" class="error hidden"></p>
    </form>

    <!-- Register form -->
    <form id="register-form" class="hidden">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="Jane Smith" required>
      </div>
      <div class="form-group">
        <label for="reg-school">School Name</label>
        <input type="text" id="reg-school" placeholder="Our Homeschool" required>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" required>
      </div>
      <button type="submit" class="btn">Create Account</button>
      <p id="register-error" class="error hidden"></p>
      <p id="register-success" class="hidden" style="color:green;margin-top:12px;"></p>
    </form>
  </div>

  <script type="module">
    import { login, getUser, getProfile } from './js/auth.js'
    import { supabase } from './js/supabase.js'

    // If already logged in, redirect
    getUser().then(async user => {
      if (user) {
        const profile = await getProfile(user.id)
        if (!profile) return // registered but no profile yet, stay on page
        if (profile.role === 'teacher') window.location.href = '/teacher/dashboard.html'
        else window.location.href = '/student/dashboard.html'
      }
    })

    function showTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login')
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register')
      document.getElementById('tab-login').classList.toggle('btn-secondary', tab !== 'login')
      document.getElementById('tab-register').classList.toggle('btn-secondary', tab !== 'register')
    }

    document.getElementById('tab-login').addEventListener('click', () => showTab('login'))
    document.getElementById('tab-register').addEventListener('click', () => showTab('register'))

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const email = document.getElementById('login-email').value
      const password = document.getElementById('login-password').value
      const errorMsg = document.getElementById('login-error')
      try {
        const { user } = await login(email, password)
        const profile = await getProfile(user.id)
        if (!profile) throw new Error('No profile found. Please register first.')
        if (profile.role === 'teacher') window.location.href = '/teacher/dashboard.html'
        else window.location.href = '/student/dashboard.html'
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })

    // Register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const name = document.getElementById('reg-name').value
      const school = document.getElementById('reg-school').value
      const email = document.getElementById('reg-email').value
      const password = document.getElementById('reg-password').value
      const errorMsg = document.getElementById('register-error')
      const successMsg = document.getElementById('register-success')

      try {
        // Sign up with Supabase auth
        const { data, error } = await supabase.auth.signUp({ email, password })
        if (error) throw error

        const userId = data.user.id

        // Create profile
        await supabase.from('profiles').insert({ id: userId, role: 'teacher', full_name: name })

        // Create school
        await supabase.from('schools').insert({ teacher_id: userId, name: school })

        successMsg.textContent = 'Account created! Check your email to confirm, then sign in.'
        successMsg.classList.remove('hidden')
        errorMsg.classList.add('hidden')
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })
  </script>
</body>
</html>
