<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-brand">Boring Boxes</div>
    <div class="sidebar-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="results.html">My Results</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="sidebar-footer">
      <div id="nav-user-info" class="sidebar-user"></div>
      <button id="logout-btn" class="btn-sign-out">Sign Out</button>
    </div>
  </nav>
  <script>(function(){const f=location.pathname.split('/').pop();document.querySelectorAll('.sidebar-links a').forEach(a=>{if(a.getAttribute('href')===f)a.classList.add('active')})})()</script>

  <div class="page" style="max-width:600px;">
    <h2>Profile</h2>

    <div class="card">
      <h3 style="margin-bottom:20px;">Personal Information</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="full-name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email">
        <p style="font-size:0.8rem;color:#999;margin-top:4px;">Changing your email will send a confirmation link to the new address.</p>
      </div>
      <button class="btn" id="save-profile-btn" style="width:auto;padding:10px 20px;">Save Changes</button>
      <p id="profile-error" class="error hidden"></p>
      <p id="profile-success" class="hidden" style="color:green;margin-top:12px;"></p>
    </div>

    <div class="card" style="margin-top:24px;">
      <h3 style="margin-bottom:12px;">School &amp; Class</h3>
      <p id="school-info" style="color:#666;"></p>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'

    const { user, profile } = await requireAuth('student')
    document.getElementById('logout-btn').addEventListener('click', logout)

    const { data: studentInfo } = await supabase
      .from('students')
      .select('schools(name), classes(name)')
      .eq('id', user.id)
      .maybeSingle()

    const schoolName = studentInfo?.schools?.name || ''
    const className = studentInfo?.classes?.name || ''

    const navParts = ['Student: ' + (profile.full_name || user.email), schoolName, className].filter(Boolean)
    document.getElementById('nav-user-info').textContent = navParts.join(' · ')

    document.getElementById('full-name').value = profile.full_name || ''
    document.getElementById('email').value = user.email || ''

    const infoParts = [schoolName, className].filter(Boolean)
    document.getElementById('school-info').textContent =
      infoParts.length > 0 ? infoParts.join(' · ') : 'No school assigned yet.'

    document.getElementById('save-profile-btn').addEventListener('click', async () => {
      const name = document.getElementById('full-name').value.trim()
      const email = document.getElementById('email').value.trim()
      const errorMsg = document.getElementById('profile-error')
      const successMsg = document.getElementById('profile-success')

      if (!name) {
        errorMsg.textContent = 'Name is required.'
        errorMsg.classList.remove('hidden')
        return
      }

      try {
        const { error: profileError } = await supabase
          .from('profiles')
          .update({ full_name: name })
          .eq('id', user.id)
        if (profileError) throw profileError

        if (email && email !== user.email) {
          const { error: emailError } = await supabase.auth.updateUser({ email })
          if (emailError) throw emailError
          successMsg.textContent = 'Name saved! Check your new email address for a confirmation link.'
        } else {
          successMsg.textContent = 'Profile saved!'
        }

        errorMsg.classList.add('hidden')
        successMsg.classList.remove('hidden')
        const newNavParts = ['Student: ' + name, schoolName, className].filter(Boolean)
        document.getElementById('nav-user-info').textContent = newNavParts.join(' · ')
        setTimeout(() => successMsg.classList.add('hidden'), 4000)
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
