<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-brand">Boring Boxes</div>
    <div class="sidebar-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="tests.html">My Tests</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="results.html">Results</a>
      <a href="socratic.html">Socratic</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="sidebar-footer">
      <div id="nav-user-info" class="sidebar-user"></div>
      <button id="logout-btn" class="btn-sign-out">Sign Out</button>
    </div>
  </nav>
  <script>(function(){const f=location.pathname.split('/').pop();document.querySelectorAll('.sidebar-links a').forEach(a=>{if(a.getAttribute('href')===f)a.classList.add('active')})})()</script>

  <div class="page">
    <h2>Welcome, <span id="teacher-name"></span></h2>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px;">
      <div class="card" style="text-align:center;">
        <div style="font-size:2rem;font-weight:700;" id="student-count">—</div>
        <div style="color:#666;">Students</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:2rem;font-weight:700;" id="test-count">—</div>
        <div style="color:#666;">Tests Created</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:2rem;font-weight:700;" id="assignment-count">—</div>
        <div style="color:#666;">Assignments</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:16px;">Quick Links</h3>
      <a href="students.html" class="btn" style="width:auto;display:inline-block;margin-right:12px;padding:10px 20px;">Add Students</a>
      <a href="tests.html" class="btn" style="width:auto;display:inline-block;margin-right:12px;padding:10px 20px;">Create a Test</a>
      <a href="catalogue.html" class="btn" style="width:auto;display:inline-block;padding:10px 20px;">Browse Catalogue</a>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'

    const { user, profile } = await requireAuth('teacher')

    document.getElementById('teacher-name').textContent = profile.full_name || user.email
    document.getElementById('logout-btn').addEventListener('click', logout)

    // Get school
    const { data: school } = await supabase
      .from('schools')
      .select('id, name')
      .eq('teacher_id', user.id)
      .single()

    document.getElementById('nav-user-info').textContent =
      `Teacher: ${profile.full_name} · ${school?.name || ''}`

    if (school) {
      const [{ count: studentCount }, { count: testCount }, { count: assignmentCount }] = await Promise.all([
        supabase.from('students').select('*', { count: 'exact', head: true }).eq('school_id', school.id),
        supabase.from('tests').select('*', { count: 'exact', head: true }).eq('school_id', school.id),
        supabase.from('assignments').select('*', { count: 'exact', head: true })
          .in('test_id', (await supabase.from('tests').select('id').eq('school_id', school.id)).data.map(t => t.id))
      ])
      document.getElementById('student-count').textContent = studentCount ?? 0
      document.getElementById('test-count').textContent = testCount ?? 0
      document.getElementById('assignment-count').textContent = assignmentCount ?? 0
    }
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
