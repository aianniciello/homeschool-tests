<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-brand">Boring Boxes</div>
    <div class="sidebar-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="tests.html">My Tests</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="results.html">Results</a>
      <a href="socratic.html">Socratic</a>
      <a href="supplements.html">Supplements</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="sidebar-footer">
      <div id="nav-user-info" class="sidebar-user"></div>
      <button id="logout-btn" class="btn-sign-out">Sign Out</button>
    </div>
  </nav>
  <script>(function(){const f=location.pathname.split('/').pop();document.querySelectorAll('.sidebar-links a').forEach(a=>{if(a.getAttribute('href')===f)a.classList.add('active')})})()</script>

  <div class="page" style="max-width:600px;">
    <h2>Profile</h2>

    <div class="card">
      <h3 style="margin-bottom:20px;">Personal Information</h3>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="full-name">
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label>Email</label>
        <input type="email" id="email">
        <p style="font-size:0.8rem;color:#999;margin-top:4px;">Changing your email will send a confirmation link to the new address.</p>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:20px;">School</h3>
      <div class="form-group" style="margin-bottom:0;">
        <label>School Name</label>
        <input type="text" id="school-name">
      </div>
    </div>

    <button class="btn" id="save-btn" style="width:auto;padding:10px 24px;">Save Changes</button>
    <p id="save-error" class="error hidden"></p>
    <p id="save-success" class="hidden" style="color:green;margin-top:12px;"></p>

    <div class="card" style="margin-top:24px;">
      <h3 style="margin-bottom:20px;">Change Password</h3>
      <div class="form-group">
        <label for="new-password">New Password</label>
        <div style="position:relative;">
          <input type="password" id="new-password" placeholder="Min 6 characters" style="padding-right:40px;">
          <button type="button" aria-label="Toggle password visibility" data-eye-for="new-password"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--on-surface-variant);padding:4px;display:flex;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label for="confirm-password">Confirm New Password</label>
        <div style="position:relative;">
          <input type="password" id="confirm-password" placeholder="Repeat new password" style="padding-right:40px;">
          <button type="button" aria-label="Toggle password visibility" data-eye-for="confirm-password"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--on-surface-variant);padding:4px;display:flex;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <button class="btn" id="password-btn" style="width:auto;padding:10px 24px;">Update Password</button>
    <p id="password-error" class="error hidden"></p>
    <p id="password-success" class="hidden" style="color:green;margin-top:12px;"></p>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'

    const { user, profile } = await requireAuth('teacher')
    document.getElementById('logout-btn').addEventListener('click', logout)

    const { data: school } = await supabase
      .from('schools')
      .select('id, name')
      .eq('teacher_id', user.id)
      .maybeSingle()

    document.getElementById('nav-user-info').textContent =
      `Teacher: ${profile.full_name} · ${school?.name || ''}`

    document.getElementById('full-name').value = profile.full_name || ''
    document.getElementById('email').value = user.email || ''
    document.getElementById('school-name').value = school?.name || ''

    document.querySelectorAll('[data-eye-for]').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.eyeFor)
        const showing = input.type === 'password'
        input.type = showing ? 'text' : 'password'
        btn.querySelector('svg').innerHTML = showing
          ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line>`
          : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`
      })
    })

    document.getElementById('password-btn').addEventListener('click', async () => {
      const newPassword = document.getElementById('new-password').value
      const confirmPassword = document.getElementById('confirm-password').value
      const errorMsg = document.getElementById('password-error')
      const successMsg = document.getElementById('password-success')

      errorMsg.classList.add('hidden')
      successMsg.classList.add('hidden')

      if (!newPassword) return (errorMsg.textContent = 'Please enter a new password.', errorMsg.classList.remove('hidden'))
      if (newPassword.length < 6) return (errorMsg.textContent = 'Password must be at least 6 characters.', errorMsg.classList.remove('hidden'))
      if (newPassword !== confirmPassword) return (errorMsg.textContent = 'Passwords do not match.', errorMsg.classList.remove('hidden'))

      const { error } = await supabase.auth.updateUser({ password: newPassword })
      if (error) {
        errorMsg.textContent = error.message
        errorMsg.classList.remove('hidden')
      } else {
        document.getElementById('new-password').value = ''
        document.getElementById('confirm-password').value = ''
        successMsg.textContent = 'Password updated!'
        successMsg.classList.remove('hidden')
        setTimeout(() => successMsg.classList.add('hidden'), 4000)
      }
    })

    document.getElementById('save-btn').addEventListener('click', async () => {
      const fullName = document.getElementById('full-name').value.trim()
      const email = document.getElementById('email').value.trim()
      const schoolName = document.getElementById('school-name').value.trim()
      const errorMsg = document.getElementById('save-error')
      const successMsg = document.getElementById('save-success')

      if (!fullName) {
        errorMsg.textContent = 'Name is required.'
        errorMsg.classList.remove('hidden')
        return
      }
      if (!schoolName) {
        errorMsg.textContent = 'School name is required.'
        errorMsg.classList.remove('hidden')
        return
      }

      try {
        const saves = [
          supabase.from('profiles').update({ full_name: fullName }).eq('id', user.id),
          supabase.from('schools').update({ name: schoolName }).eq('id', school.id)
        ]
        if (email && email !== user.email) {
          saves.push(supabase.auth.updateUser({ email }))
        }

        const results = await Promise.all(saves)
        const failed = results.find(r => r.error)
        if (failed) throw failed.error

        school.name = schoolName
        errorMsg.classList.add('hidden')
        successMsg.textContent = email && email !== user.email
          ? 'Saved! Check your new email address for a confirmation link.'
          : 'Changes saved!'
        successMsg.classList.remove('hidden')
        document.getElementById('nav-user-info').textContent =
          `Teacher: ${fullName} · ${schoolName}`
        setTimeout(() => successMsg.classList.add('hidden'), 4000)
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
