<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Socratic Trainer Results</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .score-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Manrope', sans-serif;
    }
    .score-green  { background: var(--secondary-container); color: var(--on-secondary-container); }
    .score-yellow { background: var(--tertiary-container);  color: var(--tertiary); }
    .score-red    { background: var(--error-container);     color: var(--on-error-container); }

    /* Detail panel */
    .detail-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.45); z-index: 1000;
      align-items: flex-start; justify-content: flex-end;
    }
    .detail-panel {
      background: var(--surface-card);
      width: min(560px, 100vw);
      height: 100vh;
      overflow-y: auto;
      padding: 32px 28px;
      box-shadow: -8px 0 40px rgba(12,52,89,0.12);
    }
    .detail-exchange {
      border: 1px solid rgba(64,97,137,0.12);
      border-radius: var(--radius-md);
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .detail-exchange-header {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--on-surface-variant);
      margin-bottom: 12px;
    }
    .detail-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 0.875rem;
    }
    .detail-row-label {
      flex-shrink: 0;
      width: 110px;
      font-weight: 600;
      font-size: 0.78rem;
      color: var(--on-surface-variant);
      padding-top: 1px;
    }
    .detail-question-text {
      background: var(--surface-low);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--on-surface);
      font-style: italic;
    }
    .detail-feedback-text {
      background: var(--surface-low);
      border: 1px solid var(--primary-container);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--on-surface-variant);
      white-space: pre-wrap;
    }
    .rating-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .rating-excellent { background: var(--secondary-container); color: var(--on-secondary-container); }
    .rating-good      { background: var(--tertiary-container);  color: var(--tertiary); }
    .rating-needs     { background: var(--error-container);     color: var(--on-error-container); }
  </style>
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-brand">Boring Boxes</div>
    <div class="sidebar-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="tests.html">My Tests</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="results.html">Results</a>
      <a href="socratic.html">Socratic</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="sidebar-footer">
      <div id="nav-user-info" class="sidebar-user"></div>
      <button id="logout-btn" class="btn-sign-out">Sign Out</button>
    </div>
  </nav>
  <script>(function(){const f=location.pathname.split('/').pop();document.querySelectorAll('.sidebar-links a').forEach(a=>{if(a.getAttribute('href')===f)a.classList.add('active')})})()</script>

  <div class="page">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">
      <h2>Socratic Trainer Results</h2>
      <a href="socratic-trainer.html" class="btn" style="width:auto;padding:10px 20px;text-decoration:none;flex-shrink:0;margin-left:16px;">Try the Trainer →</a>
    </div>
    <p style="color:#666;margin-bottom:28px;font-size:0.9rem;">Student sessions across Meno and Crito, with per-exchange detail.</p>

    <!-- Filter bar -->
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;align-items:center;">
      <select id="filter-student" style="width:auto;min-width:180px;">
        <option value="">All students</option>
      </select>
      <select id="filter-dialogue" style="width:auto;">
        <option value="">All dialogues</option>
        <option value="meno">Meno</option>
        <option value="crito">Crito</option>
      </select>
    </div>

    <div id="loading" style="color:#999;">Loading sessions…</div>
    <div id="empty" class="hidden" style="color:#999;margin:40px 0;text-align:center;">No sessions yet.</div>

    <table id="sessions-table" class="hidden">
      <thead>
        <tr>
          <th>Student</th>
          <th>Dialogue</th>
          <th>Overall</th>
          <th>MC</th>
          <th>Labeling</th>
          <th>Writing</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="sessions-tbody"></tbody>
    </table>

    <!-- Detail panel (slide-in) -->
    <div id="detail-overlay" class="detail-overlay hidden" onclick="closeDetail(event)">
      <div class="detail-panel" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
          <div>
            <h3 id="detail-title" style="margin-bottom:4px;"></h3>
            <p id="detail-meta" style="color:#999;font-size:0.82rem;"></p>
          </div>
          <button onclick="closeDetail()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#999;padding:0 0 0 16px;line-height:1;">&times;</button>
        </div>
        <div id="detail-scores" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;"></div>
        <div id="detail-exchanges"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'
    import { DIALOGUES } from '../js/socratic-data.js'

    const { user, profile } = await requireAuth('teacher')
    document.getElementById('logout-btn').addEventListener('click', logout)

    const { data: school } = await supabase
      .from('schools').select('id, name').eq('teacher_id', user.id).maybeSingle()

    document.getElementById('nav-user-info').textContent =
      `Teacher: ${profile.full_name} · ${school?.name || ''}`

    // ── Load all sessions for this school ─────────────────────
    let allSessions = []
    let studentNames = {}

    async function loadSessions() {
      if (!school) {
        document.getElementById('loading').textContent = 'No school found.'
        return
      }

      // Fetch sessions
      const { data: sessions } = await supabase
        .from('socratic_sessions')
        .select('id, student_id, dialogue_key, dialogue_title, mc_score, label_score, write_score, overall_score, completed_at')
        .eq('school_id', school.id)
        .order('completed_at', { ascending: false })

      document.getElementById('loading').classList.add('hidden')

      if (!sessions || sessions.length === 0) {
        document.getElementById('empty').classList.remove('hidden')
        return
      }

      // Fetch student names
      const studentIds = [...new Set(sessions.map(s => s.student_id))]
      const { data: profiles } = await supabase
        .from('profiles')
        .select('id, full_name')
        .in('id', studentIds)

      studentNames = Object.fromEntries((profiles || []).map(p => [p.id, p.full_name || p.id]))

      // Populate student filter
      const filterEl = document.getElementById('filter-student')
      studentIds.forEach(id => {
        const opt = document.createElement('option')
        opt.value = id
        opt.textContent = studentNames[id] || id
        filterEl.appendChild(opt)
      })

      allSessions = sessions
      renderTable()
    }

    function scoreChip(val) {
      const cls = val >= 80 ? 'score-green' : val >= 60 ? 'score-yellow' : 'score-red'
      return `<span class="score-chip ${cls}">${val}%</span>`
    }

    function renderTable() {
      const studentFilter  = document.getElementById('filter-student').value
      const dialogueFilter = document.getElementById('filter-dialogue').value

      const filtered = allSessions.filter(s =>
        (!studentFilter  || s.student_id  === studentFilter) &&
        (!dialogueFilter || s.dialogue_key === dialogueFilter)
      )

      const tbody = document.getElementById('sessions-tbody')
      if (!filtered.length) {
        document.getElementById('sessions-table').classList.add('hidden')
        document.getElementById('empty').classList.remove('hidden')
        return
      }

      document.getElementById('empty').classList.add('hidden')
      document.getElementById('sessions-table').classList.remove('hidden')

      tbody.innerHTML = filtered.map(s => `
        <tr>
          <td style="font-weight:600;">${studentNames[s.student_id] || '—'}</td>
          <td>${s.dialogue_title}</td>
          <td>${scoreChip(s.overall_score)}</td>
          <td>${scoreChip(s.mc_score)}</td>
          <td>${scoreChip(s.label_score)}</td>
          <td>${scoreChip(s.write_score)}</td>
          <td style="color:#999;font-size:0.82rem;">${new Date(s.completed_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</td>
          <td>
            <button class="btn btn-secondary" onclick="viewDetail('${s.id}')"
              style="width:auto;padding:6px 14px;font-size:0.8rem;">View</button>
          </td>
        </tr>
      `).join('')
    }

    document.getElementById('filter-student').addEventListener('change',  renderTable)
    document.getElementById('filter-dialogue').addEventListener('change', renderTable)

    // ── Detail panel ──────────────────────────────────────────
    window.viewDetail = async function(sessionId) {
      const session = allSessions.find(s => s.id === sessionId)
      if (!session) return

      const studentName = studentNames[session.student_id] || '—'
      const date = new Date(session.completed_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })

      document.getElementById('detail-title').textContent = `${studentName} — ${session.dialogue_title}`
      document.getElementById('detail-meta').textContent = date

      document.getElementById('detail-scores').innerHTML = [
        { label: 'Overall',  val: session.overall_score },
        { label: 'MC',       val: session.mc_score },
        { label: 'Labeling', val: session.label_score },
        { label: 'Writing',  val: session.write_score },
      ].map(({ label, val }) => {
        const cls = val >= 80 ? 'score-green' : val >= 60 ? 'score-yellow' : 'score-red'
        return `
          <div style="text-align:center;padding:12px 6px;background:var(--surface-low);border-radius:var(--radius-md);">
            <p style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--on-surface-variant);margin-bottom:4px;">${label}</p>
            <p class="score-chip ${cls}" style="font-size:1rem;padding:0;">${val}%</p>
          </div>
        `
      }).join('')

      // Fetch exchange responses
      const { data: responses } = await supabase
        .from('socratic_responses')
        .select('exchange_index, mc_correct, label_score, student_question, ai_feedback, write_rating')
        .eq('session_id', sessionId)
        .order('exchange_index')

      document.getElementById('detail-exchanges').innerHTML = ''

      const dialogueData = DIALOGUES[session.dialogue_key]
      const exchangesHtml = (responses || []).map(r => {
        const ex = dialogueData?.exchanges[r.exchange_index]
        const labelPct = Math.round(r.label_score * 100)

        const ratingClass = r.write_rating === 'Excellent' ? 'rating-excellent'
          : r.write_rating === 'Needs work' ? 'rating-needs' : 'rating-good'

        return `
          <div class="detail-exchange">
            <p class="detail-exchange-header">Exchange ${r.exchange_index + 1}${ex ? ` — ${ex.context.slice(0, 60)}…` : ''}</p>

            <div class="detail-row">
              <span class="detail-row-label">Reading check</span>
              <span>${r.mc_correct
                ? '<span style="color:var(--on-secondary-container);font-weight:600;">✓ Correct</span>'
                : '<span style="color:var(--error);font-weight:600;">✗ Incorrect</span>'}</span>
            </div>

            <div class="detail-row">
              <span class="detail-row-label">Move labeling</span>
              <span>${labelPct}%${ex ? ` &nbsp;<span style="color:#999;font-size:0.78rem;">(${ex.correctMoves.join(', ')})</span>` : ''}</span>
            </div>

            ${r.student_question ? `
              <div class="detail-row" style="flex-direction:column;gap:6px;">
                <span class="detail-row-label">Student wrote</span>
                <div class="detail-question-text">${r.student_question}</div>
              </div>
            ` : ''}

            ${r.ai_feedback ? `
              <div class="detail-row" style="flex-direction:column;gap:6px;margin-top:4px;">
                <div style="display:flex;align-items:center;gap:10px;">
                  <span class="detail-row-label">AI feedback</span>
                  ${r.write_rating ? `<span class="rating-badge ${ratingClass}">${r.write_rating}</span>` : ''}
                </div>
                <div class="detail-feedback-text">${r.ai_feedback}</div>
              </div>
            ` : ''}
          </div>
        `
      }).join('')

      document.getElementById('detail-exchanges').innerHTML = exchangesHtml ||
        '<p style="color:#999;font-size:0.875rem;">No exchange detail recorded.</p>'

      const overlay = document.getElementById('detail-overlay')
      overlay.classList.remove('hidden')
      overlay.style.display = 'flex'
    }

    window.closeDetail = function(e) {
      if (e && e.target !== document.getElementById('detail-overlay')) return
      const overlay = document.getElementById('detail-overlay')
      overlay.classList.add('hidden')
      overlay.style.display = ''
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') {
      const overlay = document.getElementById('detail-overlay')
      overlay.classList.add('hidden')
      overlay.style.display = ''
    }})

    loadSessions()
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
