<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav>
    <div>
      <a href="dashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="tests.html">My Tests</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="results.html">Results</a>
    </div>
    <button class="btn btn-secondary" id="logout-btn" style="width:auto;padding:6px 16px;">Sign Out</button>
  </nav>

  <div class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h2>Students</h2>
      <button class="btn" id="add-btn" style="width:auto;padding:10px 20px;">+ Invite Student</button>
    </div>

    <!-- Invite Form -->
    <div class="card hidden" id="add-form">
      <h3 style="margin-bottom:16px;">Invite a Student</h3>
      <p style="color:#666;margin-bottom:16px;">Enter the student's name and email. They will receive a link to create their account.</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="student-name" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="student-email" placeholder="student@example.com">
      </div>
      <div class="form-group">
        <label>Grade (optional)</label>
        <input type="text" id="student-grade" placeholder="e.g. 7th">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="save-btn" style="width:auto;padding:10px 20px;">Send Invite</button>
        <button class="btn btn-secondary" id="cancel-btn" style="width:auto;padding:10px 20px;">Cancel</button>
      </div>
      <p id="form-error" class="error hidden"></p>
      <p id="form-success" class="hidden" style="color:green;margin-top:12px;"></p>
    </div>

    <!-- Students Table -->
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Grade</th>
          <th>Status &amp; Actions</th>
        </tr>
      </thead>
      <tbody id="students-body">
        <tr><td colspan="4" style="text-align:center;color:#999;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'

    const { user } = await requireAuth('teacher')
    document.getElementById('logout-btn').addEventListener('click', logout)

    const { data: school } = await supabase
      .from('schools')
      .select('id')
      .eq('teacher_id', user.id)
      .maybeSingle()

    // Load students (registered) and pending invites
    async function loadStudents() {
      const tbody = document.getElementById('students-body')

      const [{ data: students }, { data: pending }] = await Promise.all([
        supabase.from('students')
          .select('id, grade, profiles(full_name, email)')
          .eq('school_id', school.id),
        supabase.from('pending_invites')
          .select('id, full_name, email, grade')
          .eq('school_id', school.id)
      ])

      const rows = []

      if (students && students.length > 0) {
        students.forEach(s => {
          rows.push(`<tr>
            <td>${s.profiles?.full_name || '—'}</td>
            <td>${s.profiles?.email || '—'}</td>
            <td>${s.grade || '—'}</td>
            <td style="color:green;">Registered</td>
          </tr>`)
        })
      }

      if (pending && pending.length > 0) {
        pending.forEach(p => {
          rows.push(`<tr>
            <td>${p.full_name}</td>
            <td>${p.email}</td>
            <td>${p.grade || '—'}</td>
            <td style="color:#f59e0b;">
              Invite Sent
              <button onclick="resendInvite('${p.email}', '${p.full_name}')"
                style="margin-left:8px;padding:2px 8px;font-size:0.8rem;background:#eee;border:none;border-radius:4px;cursor:pointer;">
                Resend
              </button>
            </td>
          </tr>`)
        })
      }

      if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#999;">No students yet. Invite one above!</td></tr>'
      } else {
        tbody.innerHTML = rows.join('')
      }
    }

    loadStudents()

    // Toggle form
    document.getElementById('add-btn').addEventListener('click', () => {
      document.getElementById('add-form').classList.remove('hidden')
    })
    document.getElementById('cancel-btn').addEventListener('click', () => {
      document.getElementById('add-form').classList.add('hidden')
    })

    // Resend invite
    window.resendInvite = async function(email, name) {
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: `${window.location.origin}/student/register.html` }
      })
      if (error) {
        alert('Failed to resend: ' + error.message)
      } else {
        alert(`Invite resent to ${email}!`)
      }
    }

    // Send invite
    document.getElementById('save-btn').addEventListener('click', async () => {
      const name = document.getElementById('student-name').value.trim()
      const email = document.getElementById('student-email').value.trim()
      const grade = document.getElementById('student-grade').value.trim()
      const errorMsg = document.getElementById('form-error')
      const successMsg = document.getElementById('form-success')

      if (!name || !email) {
        errorMsg.textContent = 'Name and email are required.'
        errorMsg.classList.remove('hidden')
        return
      }

      try {
        // Save to pending invites
        const { error: inviteError } = await supabase.from('pending_invites').insert({
          full_name: name,
          email: email.toLowerCase(),
          grade,
          school_id: school.id
        })
        if (inviteError) throw inviteError

        // Send magic link
        const { error: otpError } = await supabase.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: `${window.location.origin}/student/register.html`
          }
        })
        if (otpError) throw otpError

        successMsg.textContent = `Invite sent to ${email}!`
        successMsg.classList.remove('hidden')
        errorMsg.classList.add('hidden')
        document.getElementById('student-name').value = ''
        document.getElementById('student-email').value = ''
        document.getElementById('student-grade').value = ''
        loadStudents()
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })
  </script>
</body>
</html>
