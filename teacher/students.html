<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <nav class="sidebar">
    <div class="sidebar-brand">Boring Boxes</div>
    <div class="sidebar-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="tests.html">My Tests</a>
      <a href="catalogue.html">Catalogue</a>
      <a href="results.html">Results</a>
      <a href="socratic.html">Socratic</a>
      <a href="profile.html">Profile</a>
    </div>
    <div class="sidebar-footer">
      <div id="nav-user-info" class="sidebar-user"></div>
      <button id="logout-btn" class="btn-sign-out">Sign Out</button>
    </div>
  </nav>
  <script>(function(){const f=location.pathname.split('/').pop();document.querySelectorAll('.sidebar-links a').forEach(a=>{if(a.getAttribute('href')===f)a.classList.add('active')})})()</script>

  <div class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <h2>Students</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="manage-classes-btn" style="width:auto;padding:10px 20px;">Manage Classes</button>
        <button class="btn" id="add-btn" style="width:auto;padding:10px 20px;">+ Invite Student</button>
      </div>
    </div>

    <!-- Classes Management Form -->
    <div class="card hidden" id="classes-form" style="margin-bottom:24px;">
      <h3 style="margin-bottom:16px;">Classes</h3>
      <div id="classes-list" style="margin-bottom:16px;"></div>
      <div style="display:flex;gap:8px;">
        <input type="text" id="class-name-input" placeholder="New class name (e.g. Morning Group, 7th Grade)" style="flex:1;">
        <button class="btn" id="add-class-btn" style="width:auto;padding:10px 20px;margin-top:0;">+ Add Class</button>
      </div>
      <p id="class-error" class="error hidden"></p>
    </div>

    <!-- Invite Form -->
    <div class="card hidden" id="add-form" style="margin-bottom:24px;">
      <h3 style="margin-bottom:16px;">Invite a Student</h3>
      <p style="color:#666;margin-bottom:16px;">Enter the student's name and email. They will receive a link to create their account.</p>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="student-name" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="student-email" placeholder="student@example.com">
      </div>
      <div class="form-group">
        <label>Grade (optional)</label>
        <input type="text" id="student-grade" placeholder="e.g. 7th">
      </div>
      <div class="form-group">
        <label>Class (optional)</label>
        <select id="student-class">
          <option value="">No Class</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="save-btn" style="width:auto;padding:10px 20px;">Send Invite</button>
        <button class="btn btn-secondary" id="cancel-btn" style="width:auto;padding:10px 20px;">Cancel</button>
      </div>
      <p id="form-error" class="error hidden"></p>
      <p id="form-success" class="hidden" style="color:green;margin-top:12px;"></p>
    </div>

    <!-- Filters -->
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <input type="text" id="filter-search" placeholder="Search name or email…"
        style="flex:1;min-width:180px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;">
      <select id="filter-class"
        style="width:auto;min-width:150px;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;background:white;">
        <option value="">All Classes</option>
        <option value="__none__">No Class</option>
      </select>
      <select id="filter-status"
        style="width:auto;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.9rem;background:white;">
        <option value="">All Status</option>
        <option value="registered">Registered</option>
        <option value="pending">Invite Sent</option>
      </select>
    </div>

    <!-- Students Table -->
    <table>
      <thead>
        <tr>
          <th id="th-name" onclick="sortBy('name')" style="cursor:pointer;user-select:none;">Name<span class="sort-ind"> ↕</span></th>
          <th id="th-email" onclick="sortBy('email')" style="cursor:pointer;user-select:none;">Email<span class="sort-ind"> ↕</span></th>
          <th id="th-grade" onclick="sortBy('grade')" style="cursor:pointer;user-select:none;">Grade<span class="sort-ind"> ↕</span></th>
          <th id="th-className" onclick="sortBy('className')" style="cursor:pointer;user-select:none;">Class<span class="sort-ind"> ↕</span></th>
          <th id="th-status" onclick="sortBy('status')" style="cursor:pointer;user-select:none;">Status &amp; Actions<span class="sort-ind"> ↕</span></th>
        </tr>
      </thead>
      <tbody id="students-body">
        <tr><td colspan="5" style="text-align:center;color:#999;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Student results panel -->
  <div id="results-panel" class="hidden" style="position:fixed;top:0;right:0;bottom:0;width:480px;max-width:100%;background:white;box-shadow:-4px 0 24px rgba(0,0,0,0.12);z-index:100;flex-direction:column;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:24px 24px 16px;border-bottom:1px solid #eee;">
      <h3 id="panel-name" style="margin:0;"></h3>
      <button id="close-panel-btn" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#666;padding:4px;">&times;</button>
    </div>
    <div id="panel-content" style="flex:1;overflow-y:auto;padding:24px;">
      <p style="color:#999;">Loading...</p>
    </div>

    <!-- Answer detail view within the panel -->
    <div id="panel-answers" class="hidden" style="position:absolute;top:0;left:0;right:0;bottom:0;background:white;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:24px 24px 16px;border-bottom:1px solid #eee;">
        <h3 id="panel-answers-title" style="margin:0;font-size:1rem;"></h3>
        <button id="back-to-results-btn" class="btn btn-secondary" style="width:auto;padding:6px 14px;">← Back</button>
      </div>
      <div id="panel-answers-content" style="flex:1;overflow-y:auto;padding:24px;"></div>
    </div>
  </div>
  <div id="panel-backdrop" class="hidden" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.3);z-index:99;"></div>

  <script type="module">
    import { requireAuth, logout } from '../js/auth.js'
    import { supabase } from '../js/supabase.js'

    const { user, profile } = await requireAuth('teacher')
    document.getElementById('logout-btn').addEventListener('click', logout)

    const { data: school } = await supabase
      .from('schools')
      .select('id, name')
      .eq('teacher_id', user.id)
      .maybeSingle()

    document.getElementById('nav-user-info').textContent =
      `Teacher: ${profile.full_name} · ${school?.name || ''}`

    // ─── Classes management ───────────────────────────────────

    async function loadClassesList() {
      const { data: classes } = await supabase
        .from('classes')
        .select('id, name')
        .eq('school_id', school.id)
        .order('name')

      const container = document.getElementById('classes-list')
      if (!classes || classes.length === 0) {
        container.innerHTML = '<p style="color:#999;margin-bottom:8px;">No classes yet.</p>'
      } else {
        container.innerHTML = classes.map(c => `
          <div id="class-row-${c.id}" style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;gap:8px;">
            <span id="class-label-${c.id}" style="flex:1;">${c.name}</span>
            <input id="class-input-${c.id}" type="text" value="${c.name.replace(/"/g, '&quot;')}"
              style="flex:1;padding:4px 8px;border:1px solid #4f8ef7;border-radius:4px;font-size:0.9rem;display:none;">
            <div style="display:flex;gap:6px;flex-shrink:0;">
              <button id="class-edit-btn-${c.id}" onclick="startEditClass('${c.id}')"
                style="background:none;border:none;color:#4f8ef7;cursor:pointer;font-size:0.85rem;">Rename</button>
              <button id="class-save-btn-${c.id}" onclick="saveClassName('${c.id}')"
                style="background:none;border:none;color:#48bb78;cursor:pointer;font-size:0.85rem;display:none;">Save</button>
              <button id="class-cancel-btn-${c.id}" onclick="cancelEditClass('${c.id}', '${c.name.replace(/'/g, "\\'")}')"
                style="background:none;border:none;color:#999;cursor:pointer;font-size:0.85rem;display:none;">Cancel</button>
              <button onclick="deleteClass('${c.id}', '${c.name.replace(/'/g, "\\'")}')"
                style="background:none;border:none;color:#fc8181;cursor:pointer;font-size:0.85rem;">Remove</button>
            </div>
          </div>
        `).join('')
      }

      return classes || []
    }

    async function populateClassDropdown(selectedId) {
      const { data: classes } = await supabase
        .from('classes')
        .select('id, name')
        .eq('school_id', school.id)
        .order('name')

      const sel = document.getElementById('student-class')
      sel.innerHTML = '<option value="">No Class</option>' +
        (classes || []).map(c =>
          `<option value="${c.id}" ${c.id === selectedId ? 'selected' : ''}>${c.name}</option>`
        ).join('')

      return classes || []
    }

    document.getElementById('manage-classes-btn').addEventListener('click', async () => {
      const form = document.getElementById('classes-form')
      if (form.classList.contains('hidden')) {
        form.classList.remove('hidden')
        await loadClassesList()
      } else {
        form.classList.add('hidden')
      }
    })

    document.getElementById('add-class-btn').addEventListener('click', async () => {
      const name = document.getElementById('class-name-input').value.trim()
      const errorMsg = document.getElementById('class-error')

      if (!name) {
        errorMsg.textContent = 'Class name is required.'
        errorMsg.classList.remove('hidden')
        return
      }

      const { error } = await supabase.from('classes').insert({ school_id: school.id, name })
      if (error) {
        errorMsg.textContent = error.message
        errorMsg.classList.remove('hidden')
        return
      }

      errorMsg.classList.add('hidden')
      document.getElementById('class-name-input').value = ''
      await loadClassesList()
      loadStudents()
    })

    window.deleteClass = async function(classId, className) {
      if (!confirm(`Remove class "${className}"? Students in this class will be unassigned.`)) return
      await supabase.from('classes').delete().eq('id', classId)
      await loadClassesList()
      loadStudents()
    }

    window.startEditClass = function(classId) {
      document.getElementById(`class-label-${classId}`).style.display = 'none'
      document.getElementById(`class-input-${classId}`).style.display = ''
      document.getElementById(`class-edit-btn-${classId}`).style.display = 'none'
      document.getElementById(`class-save-btn-${classId}`).style.display = ''
      document.getElementById(`class-cancel-btn-${classId}`).style.display = ''
      document.getElementById(`class-input-${classId}`).focus()
    }

    window.cancelEditClass = function(classId, originalName) {
      document.getElementById(`class-input-${classId}`).value = originalName
      document.getElementById(`class-label-${classId}`).style.display = ''
      document.getElementById(`class-input-${classId}`).style.display = 'none'
      document.getElementById(`class-edit-btn-${classId}`).style.display = ''
      document.getElementById(`class-save-btn-${classId}`).style.display = 'none'
      document.getElementById(`class-cancel-btn-${classId}`).style.display = 'none'
    }

    window.saveClassName = async function(classId) {
      const newName = document.getElementById(`class-input-${classId}`).value.trim()
      if (!newName) return

      const { error } = await supabase.from('classes').update({ name: newName }).eq('id', classId)
      if (error) {
        alert('Failed to rename: ' + error.message)
        return
      }

      document.getElementById(`class-label-${classId}`).textContent = newName
      cancelEditClass(classId, newName)
      loadStudents()
    }

    // ─── Load students ────────────────────────────────────────

    let _studentData = null

    async function loadStudents() {
      const [{ data: classes }, { data: students }, { data: pending }] = await Promise.all([
        supabase.from('classes').select('id, name').eq('school_id', school.id).order('name'),
        supabase.from('students')
          .select('id, grade, class_id, profiles(full_name, email)')
          .eq('school_id', school.id),
        supabase.from('pending_invites')
          .select('id, full_name, email, grade, class_id')
          .eq('school_id', school.id)
      ])

      _studentData = { classes: classes || [], students: students || [], pending: pending || [] }

      // Update filter class dropdown
      const filterClass = document.getElementById('filter-class')
      const currentFilter = filterClass.value
      filterClass.innerHTML = '<option value="">All Classes</option><option value="__none__">No Class</option>' +
        (classes || []).map(c => `<option value="${c.id}">${c.name}</option>`).join('')
      filterClass.value = currentFilter

      renderStudents()
    }

    let _sortState = { col: 'name', dir: 'asc' }

    window.sortBy = function sortBy(col) {
      if (_sortState.col === col) {
        _sortState.dir = _sortState.dir === 'asc' ? 'desc' : 'asc'
      } else {
        _sortState.col = col
        _sortState.dir = 'asc'
      }
      updateSortHeaders()
      renderStudents()
    }

    function updateSortHeaders() {
      ['name', 'email', 'grade', 'className', 'status'].forEach(col => {
        const th = document.getElementById(`th-${col}`)
        if (!th) return
        th.querySelector('.sort-ind').textContent =
          _sortState.col === col ? (_sortState.dir === 'asc' ? ' ↑' : ' ↓') : ' ↕'
      })
    }

    function renderStudents() {
      if (!_studentData) return

      const { classes, students, pending } = _studentData
      const search = document.getElementById('filter-search').value.trim().toLowerCase()
      const filterClass = document.getElementById('filter-class').value
      const filterStatus = document.getElementById('filter-status').value

      const classMap = {}
      classes.forEach(c => { classMap[c.id] = c.name })

      const classOptions = '<option value="">No Class</option>' +
        classes.map(c => `<option value="${c.id}">${c.name}</option>`).join('')

      // Build unified items for sorting
      const items = []

      if (filterStatus !== 'pending') {
        students.forEach(s => {
          const name = s.profiles?.full_name || ''
          const email = s.profiles?.email || ''
          if (search && !name.toLowerCase().includes(search) && !email.toLowerCase().includes(search)) return
          if (filterClass === '__none__' && s.class_id) return
          if (filterClass && filterClass !== '__none__' && s.class_id !== filterClass) return
          items.push({ type: 'registered', name, email, grade: s.grade || '', className: classMap[s.class_id] || '', status: 'registered', raw: s })
        })
      }

      if (filterStatus !== 'registered') {
        pending.forEach(p => {
          const name = p.full_name || ''
          const email = p.email || ''
          if (search && !name.toLowerCase().includes(search) && !email.toLowerCase().includes(search)) return
          if (filterClass === '__none__' && p.class_id) return
          if (filterClass && filterClass !== '__none__' && p.class_id !== filterClass) return
          items.push({ type: 'pending', name, email, grade: p.grade || '', className: classMap[p.class_id] || '', status: 'pending', raw: p })
        })
      }

      // Sort
      const { col, dir } = _sortState
      items.sort((a, b) => {
        const av = (a[col] || '').toLowerCase()
        const bv = (b[col] || '').toLowerCase()
        const cmp = av.localeCompare(bv, undefined, { sensitivity: 'base', numeric: true })
        return dir === 'asc' ? cmp : -cmp
      })

      // Render
      const rows = items.map(item => {
        if (item.type === 'registered') {
          const s = item.raw
          const name = item.name || '—'
          return `<tr>
            <td>
              <button onclick="openStudentResults('${s.id}', '${name.replace(/'/g, "\\'")}')"
                style="background:none;border:none;color:#4f8ef7;cursor:pointer;padding:0;font-size:inherit;text-decoration:underline;">
                ${name}
              </button>
            </td>
            <td>${item.email || '—'}</td>
            <td>${item.grade || '—'}</td>
            <td>
              <select onchange="assignClass('${s.id}', this.value)"
                style="width:auto;padding:4px 8px;font-size:0.85rem;border:1px solid #ddd;border-radius:4px;background:white;">
                ${classOptions.replace(`value="${s.class_id}"`, `value="${s.class_id}" selected`)}
              </select>
            </td>
            <td style="color:green;">Registered</td>
          </tr>`
        } else {
          const p = item.raw
          return `<tr>
            <td>${item.name || '—'}</td>
            <td>${item.email || '—'}</td>
            <td>${item.grade || '—'}</td>
            <td style="color:#999;">${item.className || '—'}</td>
            <td style="color:#f59e0b;">
              Invite Sent
              <button onclick="resendInvite('${p.email}', '${item.name.replace(/'/g, "\\'")}')"
                style="margin-left:8px;padding:2px 8px;font-size:0.8rem;background:#eee;border:none;border-radius:4px;cursor:pointer;">
                Resend
              </button>
            </td>
          </tr>`
        }
      })

      const tbody = document.getElementById('students-body')
      if (rows.length === 0) {
        const hasFilters = search || filterClass || filterStatus
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;">${
          hasFilters ? 'No students match the current filters.' : 'No students yet. Invite one above!'
        }</td></tr>`
      } else {
        tbody.innerHTML = rows.join('')
      }
    }

    document.getElementById('filter-search').addEventListener('input', renderStudents)
    document.getElementById('filter-class').addEventListener('change', renderStudents)
    document.getElementById('filter-status').addEventListener('change', renderStudents)

    updateSortHeaders()

    loadStudents()

    window.assignClass = async function(studentId, classId) {
      await supabase
        .from('students')
        .update({ class_id: classId || null })
        .eq('id', studentId)
    }

    // ─── Invite form ──────────────────────────────────────────

    document.getElementById('add-btn').addEventListener('click', async () => {
      document.getElementById('add-form').classList.remove('hidden')
      await populateClassDropdown()
    })

    document.getElementById('cancel-btn').addEventListener('click', () => {
      document.getElementById('add-form').classList.add('hidden')
    })

    // Resend invite
    window.resendInvite = async function(email, name) {
      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: `${window.location.origin}/student/register.html` }
      })
      if (error) {
        alert('Failed to resend: ' + error.message)
      } else {
        alert(`Invite resent to ${email}!`)
      }
    }

    // Send invite
    document.getElementById('save-btn').addEventListener('click', async () => {
      const name = document.getElementById('student-name').value.trim()
      const email = document.getElementById('student-email').value.trim()
      const grade = document.getElementById('student-grade').value.trim()
      const classId = document.getElementById('student-class').value || null
      const errorMsg = document.getElementById('form-error')
      const successMsg = document.getElementById('form-success')

      if (!name || !email) {
        errorMsg.textContent = 'Name and email are required.'
        errorMsg.classList.remove('hidden')
        return
      }

      try {
        const { error: inviteError } = await supabase.from('pending_invites').insert({
          full_name: name,
          email: email.toLowerCase(),
          grade,
          class_id: classId,
          school_id: school.id
        })
        if (inviteError) throw inviteError

        const { error: otpError } = await supabase.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: `${window.location.origin}/student/register.html`
          }
        })
        if (otpError) throw otpError

        successMsg.textContent = `Invite sent to ${email}!`
        successMsg.classList.remove('hidden')
        errorMsg.classList.add('hidden')
        document.getElementById('student-name').value = ''
        document.getElementById('student-email').value = ''
        document.getElementById('student-grade').value = ''
        document.getElementById('student-class').value = ''
        loadStudents()
      } catch (err) {
        errorMsg.textContent = err.message
        errorMsg.classList.remove('hidden')
      }
    })

    // ─── Student results panel ────────────────────────────────

    function openPanel() {
      const panel = document.getElementById('results-panel')
      panel.classList.remove('hidden')
      panel.style.display = 'flex'
      document.getElementById('panel-backdrop').classList.remove('hidden')
      document.getElementById('panel-answers').classList.add('hidden')
      document.getElementById('panel-answers').style.display = 'none'
    }

    function closePanel() {
      const panel = document.getElementById('results-panel')
      panel.classList.add('hidden')
      panel.style.display = 'none'
      document.getElementById('panel-backdrop').classList.add('hidden')
    }

    document.getElementById('close-panel-btn').addEventListener('click', closePanel)
    document.getElementById('panel-backdrop').addEventListener('click', closePanel)
    document.getElementById('back-to-results-btn').addEventListener('click', () => {
      const pa = document.getElementById('panel-answers')
      pa.classList.add('hidden')
      pa.style.display = 'none'
    })

    window.openStudentResults = async function(studentId, studentName) {
      document.getElementById('panel-name').textContent = studentName
      document.getElementById('panel-content').innerHTML = '<p style="color:#999;">Loading...</p>'
      openPanel()

      const { data: assignments } = await supabase
        .from('assignments')
        .select('id, test_id, due_date, tests(id, title)')
        .eq('student_id', studentId)
        .eq('school_id', school.id)

      if (!assignments || assignments.length === 0) {
        document.getElementById('panel-content').innerHTML =
          '<p style="color:#999;text-align:center;margin-top:40px;">No tests assigned yet.</p>'
        return
      }

      const results = await Promise.all(assignments.map(async (a) => {
        const { data: submissions } = await supabase
          .from('submissions')
          .select('question_id, choice_id')
          .eq('assignment_id', a.id)

        if (!submissions || submissions.length === 0) {
          return { assignment: a, submitted: false }
        }

        const { data: questions } = await supabase
          .from('questions')
          .select('id, choices(id, is_correct)')
          .eq('test_id', a.tests.id)

        let correct = 0
        for (const sub of submissions) {
          const q = questions?.find(q => q.id === sub.question_id)
          if (q?.choices?.some(c => c.id === sub.choice_id && c.is_correct)) correct++
        }

        const total = questions?.length || 0
        const percentage = total > 0 ? Math.round((correct / total) * 100) : 0
        return { assignment: a, submitted: true, submissions, correct, total, percentage }
      }))

      window._panelResults = results

      const html = results.map(r => `
        <div class="card" style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <strong>${r.assignment.tests?.title || 'Untitled'}</strong>
            ${r.submitted
              ? `<p style="color:#666;font-size:0.85rem;margin-top:4px;">${r.correct} / ${r.total} correct</p>`
              : `<p style="color:#999;font-size:0.85rem;margin-top:4px;">Not taken yet</p>`
            }
          </div>
          ${r.submitted ? `
            <div style="display:flex;align-items:center;gap:12px;">
              <span style="font-size:1.3rem;font-weight:700;color:${r.percentage >= 70 ? '#48bb78' : r.percentage >= 50 ? '#ed8936' : '#fc8181'}">
                ${r.percentage}%
              </span>
              <button class="btn btn-secondary" onclick="showAnswers('${r.assignment.id}', '${(r.assignment.tests?.title || 'Test').replace(/'/g, "\\'")}')"
                style="width:auto;padding:6px 14px;font-size:0.85rem;">
                Answers
              </button>
            </div>
          ` : ''}
        </div>
      `).join('')

      document.getElementById('panel-content').innerHTML = html
    }

    window.showAnswers = async function(assignmentId, testTitle) {
      const result = window._panelResults?.find(r => r.assignment.id === assignmentId)
      if (!result) return

      document.getElementById('panel-answers-title').textContent = testTitle
      document.getElementById('panel-answers-content').innerHTML = '<p style="color:#999;">Loading...</p>'
      const pa = document.getElementById('panel-answers')
      pa.classList.remove('hidden')
      pa.style.display = 'flex'

      const { data: questions } = await supabase
        .from('questions')
        .select('id, question_text, position, choices(id, choice_text, is_correct)')
        .eq('test_id', result.assignment.tests.id)
        .order('position')

      if (questions) {
        for (const q of questions) {
          if (!q.choices || q.choices.length === 0) {
            const { data: choices } = await supabase
              .from('choices').select('id, choice_text, is_correct').eq('question_id', q.id)
            q.choices = choices || []
          }
        }
      }

      const subMap = {}
      result.submissions.forEach(s => { subMap[s.question_id] = s.choice_id })

      document.getElementById('panel-answers-content').innerHTML = (questions || []).map((q, i) => {
        const chosenId = subMap[q.id]
        const chosen = q.choices.find(c => c.id === chosenId)
        const correct = q.choices.find(c => c.is_correct)
        const isCorrect = chosen?.is_correct || false

        return `
          <div class="card" style="margin-bottom:10px;border-left:4px solid ${isCorrect ? '#48bb78' : '#fc8181'};">
            <p style="font-weight:600;margin-bottom:6px;">Q${i + 1}: ${q.question_text}</p>
            <p>Answer: <span style="font-weight:600;color:${isCorrect ? '#48bb78' : '#fc8181'}">
              ${chosen?.choice_text || 'Not answered'}
            </span> ${isCorrect ? '✓' : '✗'}</p>
            ${!isCorrect && correct ? `<p style="color:#48bb78;margin-top:4px;">Correct: <strong>${correct.choice_text}</strong></p>` : ''}
          </div>
        `
      }).join('')
    }
  </script>
  <script src="../js/nav.js"></script>
</body>
</html>
